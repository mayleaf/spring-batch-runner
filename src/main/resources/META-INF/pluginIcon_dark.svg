<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Spring official leaf logo style - dark theme -->
  <defs>
    <linearGradient id="springGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6DB33F"/>
      <stop offset="100%" style="stop-color:#5FA134"/>
    </linearGradient>
  </defs>
  
  <!-- Spring leaf - official style curved leaf -->
  <path d="M 32 8 
           C 18 8, 8 18, 8 32
           C 14 28, 22 26, 28 20
           C 34 14, 36 10, 32 8 Z" 
        fill="url(#springGreen)"/>
  
  <!-- Leaf vein / stem curl -->
  <path d="M 10 30 
           Q 14 24, 18 20 
           Q 22 16, 28 12" 
        stroke="#fff" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.7"/>
</svg>
