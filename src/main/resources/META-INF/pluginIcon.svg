<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Spring official logo -->
  <circle cx="20" cy="20" r="18" fill="#6DB33F"/>
  
  <!-- Outer leaf curve (negative space) -->
  <path d="M 32 10
           C 32 10, 34 16, 30 22
           C 26 28, 18 32, 10 32
           C 14 28, 18 24, 22 18
           C 26 12, 32 10, 32 10 Z"
        fill="#fff"/>
  
  <!-- Inner leaf (negative space) -->
  <path d="M 10 32
           C 10 32, 8 24, 12 18
           C 16 12, 24 10, 32 10
           C 28 14, 24 18, 20 24
           C 16 30, 10 32, 10 32 Z"
        fill="#6DB33F"/>
  
  <!-- Inner white leaf -->
  <path d="M 28 14
           C 28 14, 30 18, 26 24
           C 22 30, 14 34, 12 34
           C 14 30, 18 26, 22 22
           C 26 18, 28 14, 28 14 Z"
        fill="#fff"/>
  
  <!-- Small circle (seed) -->
  <circle cx="12" cy="28" r="2.5" fill="#fff"/>
</svg>
